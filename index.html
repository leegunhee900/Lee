let idx=0; const ans=Array(questions.length).fill(null); const checked=Array(questions.length).fill(false); let time=3600;
const quiz=document.getElementById('quiz'), nav=document.getElementById('nav');
function norm(s){return (s||'').replace(/\s/g,'').trim().toLowerCase()}
function renderNav(){nav.innerHTML='';questions.forEach((q,i)=>{const b=document.createElement('button');b.textContent=i+1;b.className=(i===idx?'active ':'')+(ans[i]!=null?'done':'');b.onclick=()=>{idx=i;render()};nav.appendChild(b)})}
function render(){const q=questions[idx];document.getElementById('curNo').textContent=idx+1;document.getElementById('answered').textContent=ans.filter(x=>x!==null).length;renderNav();let html=`<div class="qhead"><div><span class="tag">${q.type==='mc'?'객관식':'주관식'}</span> <span class="tag scoretag">${q.score}점</span></div><div class="small">${idx+1} / ${questions.length}</div></div><div class="question">${idx+1}. ${q.q}</div>`;
if(q.type==='mc'){html+=`<div class="opts">`;q.opts.forEach((o,i)=>{let cls='opt'; if(ans[idx]===i) cls+=' selected'; if(checked[idx]&&i===q.a) cls+=' correct'; if(checked[idx]&&ans[idx]===i&&i!==q.a) cls+=' wrong'; html+=`<button class="${cls}" onclick="choose(${i})">${['①','②','③','④'][i]} ${o}</button>`});html+=`</div>`}else{html+=`<input type="text" id="shortAns" placeholder="정답 한 단어 입력" value="${ans[idx]||''}" oninput="ans[${idx}]=this.value;renderNav();document.getElementById('answered').textContent=ans.filter(x=>x!==null).length"><div class="controls"><button onclick="checkShort()">정답 확인</button></div>`}
let ex=''; if(checked[idx]){const ok=isCorrect(idx);ex=`<div class="explain ${ok?'ok':'bad'}"><b>${ok?'정답입니다.':'오답입니다.'}</b><br>${ok?'해설':'오답 이유'}: ${q.exp}<br><span class="small">정답: ${q.type==='mc'?q.opts[q.a]:q.answers[0]}</span></div>`} else ex=`<div class="explain"></div>`;
html+=ex+`<div class="controls"><button class="secondary" onclick="prev()" ${idx===0?'disabled':''}>이전</button><button onclick="next()" ${idx===questions.length-1?'disabled':''}>다음</button><button class="submit" onclick="finish()">제출</button></div>`;quiz.innerHTML=html}
function choose(i){ans[idx]=i;checked[idx]=true;render()}
function checkShort(){const v=document.getElementById('shortAns').value;ans[idx]=v||'';checked[idx]=true;render()}
function isCorrect(i){const q=questions[i]; if(q.type==='mc') return ans[i]===q.a; return q.answers.some(a=>norm(a)===norm(ans[i]))}
function prev(){if(idx>0){idx--;render()}} function next(){if(idx<questions.length-1){idx++;render()}}
function finish(){let score=0, correct=0;questions.forEach((q,i)=>{checked[i]=true;if(isCorrect(i)){score+=q.score;correct++}});render();document.getElementById('result').style.display='block';document.getElementById('result').innerHTML=`<div class="result"><b>최종 점수: ${score}점 / 100점</b><br>정답 수: ${correct}문항 / ${questions.length}문항<br><span class="small">오답 문항은 번호를 눌러 해설을 확인하세요.</span></div>`;window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}) }
setInterval(()=>{if(time>0){time--;let m=String(Math.floor(time/60)).padStart(2,'0'),s=String(time%60).padStart(2,'0');document.getElementById('timer').textContent=`${m}:${s}`}else{finish()}},1000);
render();
</script>
